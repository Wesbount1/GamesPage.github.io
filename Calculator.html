<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simple</title>
    <style>
        /* CSS para estilizar la calculadora */
        .calculator {
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 200px;
            margin: 50px auto;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .calculator-screen {
            width: 90%;
            height: 40px;
            margin-bottom: 10px;
            padding: 0 10px;
            font-size: 20px;
            text-align: right;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .calculator-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 5px;
        }
        .key {
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #e9e9e9;
            transition: background-color 0.2s;
        }
        .key:hover {
            background-color: #d4d4d4;
        }
        .operator {
            background-color: #ff9800;
            color: white;
        }
        .all-clear {
            background-color: #f44336;
            color: white;
        }
        .equal-sign {
            background-color: #4CAF50;
            color: white;
            grid-column: span 2; /* Ocupa dos columnas */
        }
    </style>
</head>
<body>

    <a href="student.html">Inicio</a> 
    <div class="calculator">
        <input type="text" class="calculator-screen" value="0" disabled />

        <div class="calculator-keys">
            <!-- Botones numéricos -->
            <button type="button" class="key number">7</button>
            <button type="button" class="key number">8</button>
            <button type="button" class="key number">9</button>
            <button type="button" class="key operator" value="*">&times;</button>

            <button type="button" class="key number">4</button>
            <button type="button" class="key number">5</button>
            <button type="button" class="key number">6</button>
            <button type="button" class="key operator" value="-">&minus;</button>

            <button type="button" class="key number">1</button>
            <button type="button" class="key number">2</button>
            <button type="button" class="key number">3</button>
            <button type="button" class="key operator" value="+">&plus;</button>

            <button type="button" class="key number">0</button>
            <button type="button" class="key decimal" value=".">.</button>
            <button type="button" class="key equal-sign" value="=">=</button>
            <button type="button" class="key operator" value="/">&divide;</button>

            <button type="button" class="key all-clear" value="all-clear">AC</button>
        </div>
    </div>

    <script>
        // JavaScript para la lógica de la calculadora
        const calculator = document.querySelector('.calculator');
        const keys = calculator.querySelector('.calculator-keys');
        const display = document.querySelector('.calculator-screen');
        
        let displayValue = '0';
        let firstValue = null;
        let operator = null;
        let waitingForSecondValue = false;

        function updateDisplay() {
            display.value = displayValue;
        }

        function clearCalculator() {
            displayValue = '0';
            firstValue = null;
            operator = null;
            waitingForSecondValue = false;
        }

        function inputDigit(digit) {
            if (waitingForSecondValue === true) {
                displayValue = digit;
                waitingForSecondValue = false;
            } else {
                // Previene ceros a la izquierda
                displayValue = displayValue === '0' ? digit : displayValue + digit;
            }
        }

        function inputDecimal(dot) {
            if (waitingForSecondValue === true) return;
            // Asegura que no se agreguen múltiples puntos decimales
            if (!displayValue.includes(dot)) {
                displayValue += dot;
            }
        }

        function handleOperator(nextOperator) {
            const inputValue = parseFloat(displayValue);

            if (operator && waitingForSecondValue)  {
                operator = nextOperator;
                return;
            }

            if (firstValue === null) {
                firstValue = inputValue;
            } else if (operator) {
                const result = calculate(firstValue, inputValue, operator);
                displayValue = String(result);
                firstValue = result;
            }

            waitingForSecondValue = true;
            operator = nextOperator;
        }

        function calculate(first, second, operator) {
            if (operator === '+') return first + second;
            if (operator === '-') return first - second;
            if (operator === '*') return first * second;
            if (operator === '/') return first / second;
            return second;
        }

        keys.addEventListener('click', (event) => {
            const { target } = event;
            if (!target.matches('button')) {
                return;
            }

            if (target.classList.contains('number')) {
                inputDigit(target.value || target.textContent);
                updateDisplay();
                return;
            }

            if (target.classList.contains('decimal')) {
                inputDecimal(target.value || target.textContent);
                updateDisplay();
                return;
            }

            if (target.classList.contains('operator')) {
                handleOperator(target.value || target.textContent);
                updateDisplay();
                return;
            }

            if (target.classList.contains('all-clear')) {
                clearCalculator();
                updateDisplay();
                return;
            }
            
            if (target.classList.contains('equal-sign')) {
                 handleOperator(target.value || target.textContent);
                 updateDisplay();
                 return;
            }
        });
        
        updateDisplay(); // Inicializa la pantalla
    </script>
</body>
</html>
